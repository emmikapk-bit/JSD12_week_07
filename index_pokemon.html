<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
  </head>
  <body class="flex flex-col items-center mx-auto p-4">
    <!-- pokemon start here -->
    <div class="flex-wrap p-5 font-serif">
      <h1 class="text-3xl font-bold mb-2">Fetch + DOM + Pokemon</h1>
      <p class="mb-5 text-gray-700">Pokemon random.</p>

      <button
        id="add-btn"
        class="font-sans px-4 py-2 mb-3 bg-pink-400 hover:bg-pink-700 text-white rounded cursor-pointer mr-2 transition-colors"
      >
        Add(Append) Random Pokemon
      </button>
      <button
        id="remove-btn"
        class="font-sans px-4 py-2 bg-pink-400 hover:bg-pink-700 text-white rounded cursor-pointer transition-colors"
      >
        Remove Last(Child) Pokemon
      </button>
    </div>

    <!-- Catch 'em all! -->
    <div id="pokemon-container" class="flex flex-wrap gap-4 my-5"></div>

    <script src="index_pokemon.js"></script>
  </body>
</html>
