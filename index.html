<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cherry blossoms with Senpai</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-pink-200">
    <main class="flex flex-col items-center justify-center my-20">
      <section class="flex flex-col items-center justify-center mb-6">
        <button
          id="btn-sakura"
          class="btn : cursor-pointer focus:outline-none active:scale-90 mb-6"
        >
          <img
            src="./emoji-pink-flowers-cherry-blossom-sticker-cherry-blossom-removebg-preview.png"
            alt="cherry-blossom"
            class="transition-all duration-100"
          />
        </button>
        <p id="text-display" class="text-4xl font-bold py-4 px-4"></p>
      </section>
      <section class="flex max-md:flex-col max-md:gap-10 gap-20">
        <div class="flex flex-col bg-white rounded-3xl p-10 gap-4">
          <h1 id="Sakura-count" class="text-4xl font-bold text-pink-300">
            Sakura: 0
          </h1>
          <h1 id="click-power" class="text-2xl font-bold text-pink-300">
            clickPowerLuv: 1
          </h1>
          <h1 id="auto-power" class="text-2xl font-bold text-pink-300">
            autoPowerLuv: 0
          </h1>
        </div>
        <div class="flex flex-col bg-white rounded-3xl p-10 gap-4">
          <button
            id="click-Upgrade"
            class="text-2xl font-bold text-white py-2 px-4 rounded-3xl bg-pink-400 hover:bg-pink-300 hover:shadow-[3px_3px_0px_0px] hover:shadow-gray-400 shadow-slate-400"
          >
            clickUpgradeCost: 10
          </button>
          <button
            id="click-autoUpgrade"
            class="text-2xl font-bold text-white py-2 px-4 rounded-3xl bg-pink-400 hover:bg-pink-300 hover:shadow-[3px_3px_0px_0px] hover:shadow-gray-400 shadow-slate-400"
          >
            autoUpgradeCost: 25
          </button>
          <button
            id="click-Sakura"
            class="text-2xl font-bold text-white py-2 px-4 rounded-3xl bg-pink-400 hover:bg-pink-300 hover:shadow-[3px_3px_0px_0px] hover:shadow-gray-400 shadow-slate-400"
          >
            Cherry blossoms: 50
          </button>
        </div>
      </section>
    </main>
  </body>
  <script src="./cherry_blossoms.js"></script>
</html>
